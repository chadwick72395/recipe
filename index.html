<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Recipe Site</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
      cursor: pointer;
      text-align: center;
      padding: 24px;
    }
    h1 { margin: 0 0 12px; font-size: 42px; }
    p { margin: 0; font-size: 18px; color: #444; }
  </style>
</head>
<body>
  <main>
    <h1>Welcome to My Recipe Site</h1>
    <p>Click anywhere or press any key to enter</p>
  </main>

  <script>
    const enter = () => window.location.href = "home.html";

    // Click/tap anywhere
    document.addEventListener("click", enter, { once: true });

    // Any key
    document.addEventListener("keydown", enter, { once: true });

    // Mobile: some browsers don't fire click immediately; touch helps.
    document.addEventListener("touchstart", enter, { once: true, passive: true });
  </script>
</body>
</html>
